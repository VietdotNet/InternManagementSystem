name: Build and Push Docker Image to ACR

on:
  push:
    branches:
      - main

env:
  REGISTRY: imsregistry2026.azurecr.io
  IMAGE_NAME: ims-api
  WEBAPP_NAME: ims-vnq 
  RESOURCE_GROUP: ims-rg

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout source
      uses: actions/checkout@v4

    - name: Show files 
      run: ls -R

    - name: Login Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login ACR
      run: az acr login --name imsregistry2026

    - name: Build Docker Image
      run: |
        docker build -f IMS_BE/IMS_API/Dockerfile -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} -t $REGISTRY/$IMAGE_NAME:latest IMS_BE

    - name: Push Docker Image
      run: |
        docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}
        docker push $REGISTRY/$IMAGE_NAME:latest

    - name: Assign ACR Pull Role
      run: |
        ACR_ID=$(az acr show -n imsregistry2026 --query id -o tsv)

        PRINCIPAL_ID=$(az webapp identity assign \
          --name $WEBAPP_NAME \
          --resource-group $RESOURCE_GROUP \
          --query principalId -o tsv)

        az role assignment create \
          --assignee $PRINCIPAL_ID \
          --role AcrPull \
          --scope $ACR_ID

    - name: Deploy to Azure Web App 
      uses: azure/webapps-deploy@v3 
      with: 
        app-name: ${{ env.WEBAPP_NAME }} 
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

    - name: Azure Logout 
      run: az logout
