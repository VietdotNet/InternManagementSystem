name: ims-prod

services:

  # ===============================
  # SQL Server
  # ===============================
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ims_sqlserver
    restart: unless-stopped

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      SA_PASSWORD: ${SA_PASSWORD}

    ports:
      - "1433:1433"

    volumes:
      - sql_data:/var/opt/mssql
      - ./backup:/var/opt/mssql/backup

    networks:
      - ims_network

    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong@123", "-Q", "SELECT 1", "-C"]
      interval: 15s
      timeout: 5s
      retries: 10


  # ===============================
  # .NET 8 API
  # ===============================
  api:
    container_name: ims_api
    restart: unless-stopped

    build:
      context: .
      dockerfile: IMS_API/Dockerfile

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:

      # ASP.NET Core
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      # Database
      ConnectionStrings__IMS_SPA: ${DB_CONNECTION}

      # JWT
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES}
      JwtSettings__RefreshTokenDays: ${JWT_REFRESH_TOKEN_DAYS}

      # Mail
      MailSettings__Mail: ${MAIL_USER}
      MailSettings__DisplayName: ${MAIL_DISPLAY_NAME}
      MailSettings__Password: ${MAIL_PASSWORD}
      MailSettings__Host: ${MAIL_HOST}
      MailSettings__EnableSSL: ${MAIL_ENABLE_SSL}
      MailSettings__Port: ${MAIL_PORT}

      # Google Auth
      GoogleAuth__ClientId: ${GOOGLE_CLIENT_ID}

      # CORS
      AllowedOrigins__0: ${CORS_ORIGIN_1}
      AllowedOrigins__1: ${CORS_ORIGIN_2}
      AllowedOrigins__2: ${CORS_ORIGIN_3}
      AllowedOrigins__3: ${CORS_ORIGIN_4}

    networks:
      - ims_network


  # ===============================
  # NGINX Reverse Proxy (HTTP/HTTPS)
  # ===============================
  nginx:
    image: nginx:latest
    container_name: ims_nginx
    restart: unless-stopped

    depends_on:
      - api

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

    networks:
      - ims_network


# ===============================
# Volumes
# ===============================
volumes:
  sql_data:


# ===============================
# Networks
# ===============================
networks:
  ims_network:
    driver: bridge
